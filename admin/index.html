<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f2e9">
  <title>管理画面ログイン｜うんなん暮らしの学び帖</title>
  <meta name="description" content="うんなん暮らしの学び帖 管理画面ログイン">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #f7f2e9;
      --paper-deep: #eee6d8;
      --card: rgba(255, 255, 255, 0.78);
      --ink: #27231f;
      --sub: #6f6255;
      --line: #d9cdbc;
      --accent: #947b5c;
      --accent-soft: #b5aa8a;
      --shadow: 0 24px 60px rgba(74, 57, 38, 0.10);
      --font-serif: "Shippori Mincho", "Yu Mincho", "Hiragino Mincho ProN", serif;
      --font-sans: "Zen Kaku Gothic New", system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      color: var(--ink);
      font-family: var(--font-sans);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.82), transparent 34%),
        radial-gradient(circle at 78% 24%, rgba(255,255,255,.56), transparent 30%),
        linear-gradient(180deg, #faf7f1 0%, var(--paper) 45%, #f4ede3 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .26;
      background-image:
        repeating-linear-gradient(0deg, rgba(92,71,46,.025) 0, rgba(92,71,46,.025) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(92,71,46,.016) 0, rgba(92,71,46,.016) 1px, transparent 1px, transparent 5px);
      mix-blend-mode: multiply;
    }

    .page {
      position: relative;
      min-height: 100svh;
      display: grid;
      grid-template-rows: 1fr auto;
      isolation: isolate;
    }

    .page-inner {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 54px 28px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-shell {
      width: min(100%, 760px);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .brand-mark {
      width: 86px;
      height: 72px;
      margin: 0 auto 14px;
      color: #8d765a;
    }

    .brand-mark svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .site-title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(34px, 4vw, 56px);
      font-weight: 600;
      letter-spacing: .075em;
      line-height: 1.35;
    }

    .page-title {
      margin: 18px 0 46px;
      color: #6f604d;
      font-family: var(--font-serif);
      font-size: clamp(18px, 2vw, 25px);
      font-weight: 500;
      letter-spacing: .12em;
    }

    .login-card {
      width: min(100%, 660px);
      margin: 0 auto;
      padding: 58px 54px 52px;
      border: 1px solid rgba(183, 161, 132, .55);
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .login-card h2 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(28px, 3vw, 38px);
      font-weight: 700;
      letter-spacing: .05em;
    }

    .login-card .lead {
      max-width: 480px;
      margin: 22px auto 0;
      color: #645c54;
      font-size: 18px;
      line-height: 1.95;
    }

    .divider {
      height: 1px;
      margin: 36px 0;
      background: linear-gradient(90deg, transparent, #d7cbbb 12%, #d7cbbb 88%, transparent);
    }

    .google-button {
      width: 100%;
      min-height: 92px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 18px 28px;
      border: 1.5px solid #8f8a82;
      border-radius: 16px;
      color: #211f1d;
      background: rgba(255,255,255,.76);
      font: inherit;
      font-size: clamp(19px, 2vw, 25px);
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(56, 43, 30, .03);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    .google-button:hover {
      transform: translateY(-2px);
      border-color: #6f675f;
      background: #fff;
      box-shadow: 0 13px 26px rgba(56, 43, 30, .10);
    }

    .google-button:active {
      transform: translateY(0);
    }

    .google-button:focus-visible {
      outline: 3px solid rgba(148, 123, 92, .30);
      outline-offset: 4px;
    }

    .google-logo {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
    }

    .security-note {
      margin: 28px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #6a5f53;
      font-size: 14px;
      line-height: 1.7;
    }

    .lock-icon {
      width: 22px;
      height: 22px;
      color: #6f5f4b;
      flex: 0 0 auto;
    }

    .decor {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      color: #b8aa91;
      opacity: .4;
    }

    .decor-leaves {
      top: -18px;
      right: -20px;
      width: min(26vw, 370px);
      transform: rotate(4deg);
      opacity: .24;
    }

    .decor-vase {
      left: -14px;
      bottom: -26px;
      width: min(34vw, 470px);
      opacity: .42;
    }

    .desk-line {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 82px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(142,117,88,.11) 18%, rgba(142,117,88,.11) 82%, transparent);
      z-index: 0;
    }

    footer {
      position: relative;
      z-index: 2;
      padding: 22px 20px 28px;
      color: #6f6256;
      text-align: center;
      font-size: 13px;
      letter-spacing: .025em;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .page-inner {
        padding: 34px 18px 22px;
        align-items: start;
      }

      .brand-mark {
        width: 66px;
        height: 56px;
        margin-bottom: 10px;
      }

      .site-title {
        font-size: clamp(29px, 8vw, 42px);
        letter-spacing: .045em;
      }

      .page-title {
        margin: 12px 0 28px;
        font-size: 17px;
      }

      .login-card {
        padding: 38px 22px 32px;
        border-radius: 18px;
      }

      .login-card h2 {
        font-size: 27px;
      }

      .login-card .lead {
        margin-top: 16px;
        font-size: 15px;
        line-height: 1.85;
      }

      .divider {
        margin: 26px 0;
      }

      .google-button {
        min-height: 74px;
        gap: 18px;
        padding-inline: 18px;
        font-size: 19px;
      }

      .google-logo {
        width: 32px;
        height: 32px;
        flex-basis: 32px;
      }

      .security-note {
        align-items: flex-start;
        font-size: 12px;
      }

      .decor-leaves {
        width: 180px;
      }

      .decor-vase {
        width: 220px;
        left: -65px;
        opacity: .23;
      }

      footer {
        font-size: 11px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
        animation-duration: .001ms !important;
      }
    }
  </style>
</head>

    <div class="desk-line" aria-hidden="true"></div>

    <footer>

</html>
